# infra/docker-compose.prod.yml
version: '3.8'

services:
  # --- Database ---
  db:
    image: pgvector/pgvector:pg16
    container_name: acufy-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-acufy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acufy_pass}
      POSTGRES_DB: ${POSTGRES_DB:-acufy_db}
    volumes:
      - acufy_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acufy -d acufy_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: acufy-redis-prod
    restart: always
    volumes:
      - acufy_redis_data:/data

  # --- Storage ---
  minio:
    image: minio/minio:latest
    container_name: acufy-minio-prod
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - acufy_minio_data:/data

  # --- Backend API ---
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: acufy-backend-prod
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://acufy:acufy_pass@db:5432/acufy_db
      REDIS_URL: redis://redis:6379/0
      STORAGE_ENDPOINT_URL: http://minio:9000

  # --- Frontend ---
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: acufy-frontend-prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  acufy_pg_data:
  acufy_redis_data:
  acufy_minio_data:
