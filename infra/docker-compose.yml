version: '3.8'

services:
  # ─── PostgreSQL + pgvector ──────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: acufy-db
    restart: always
    environment:
      POSTGRES_USER: acufy
      POSTGRES_PASSWORD: acufy_pass
      POSTGRES_DB: acufy_db
    ports:
      - "5434:5432"
    volumes:
      - acufy_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acufy -d acufy_db"]
      interval: 10s
      retries: 5
      start_period: 30s

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: acufy-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - acufy_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ─── MinIO (local S3-compatible object storage) ─────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: acufy-minio
    restart: always
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - acufy_minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123

  # ─── Adminer (DB browser) ────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: acufy-adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy

volumes:
  acufy_pg_data:
  acufy_redis_data:
  acufy_minio_data:
